<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="cart.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">MY STORE</div>
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none; position:absolute; top:-5px; right:-10px;">0</span>
            </div>
            <div class="help-icon" onclick="window.location.href='help.html'" style="cursor: pointer; color: white; font-size: 22px; margin-left: 15px; display: flex; align-items: center;" title="Help Center">
                 <i class="fas fa-headset"></i>
            </div>
        </div>
    </header>

    <div class="container cart-page">

        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom: 20px;">
          <i class="fas fa-arrow-left"></i> Continue Shopping
        </button>

        <h2>Shopping Cart</h2>

        <div class="cart-layout">
            <div class="cart-items" id="cart-items-container">
                <p>Your cart is empty.</p>
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="sub-total">Rs. 0.00</span>
                </div>
                <div class="summary-row">
                  <span>Shipping Fee</span>
                 <span id="shipping-fee">Rs. 0.00</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="grand-total">Rs. 350.00</span>
                </div>
                <button class="checkout-btn" onclick="checkPriceAndProceed()">PROCEED TO CHECKOUT</button>
            </div>
        </div>
    </div>

    <div id="warning-modal" class="modal">
    <div class="modal-content">
        <div class="warning-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h2>High Value Order!</h2>
        <p id="warning-msg">Your total amount is high. Please verify items.</p>
        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeWarning()">Go Back</button>
            <button class="proceed-btn" onclick="proceedToCheckout()">Yes, Proceed</button>
        </div>
    </div>
</div>

    <script src="cart.js"></script>

    <script>
        // කාට් එකේ බඩු පෙන්නන ලොජික් එක
        function loadCart() {
    let cart = JSON.parse(localStorage.getItem('myCart')) || [];
    const container = document.getElementById('cart-items-container');
    

    if (cart.length === 0) {
        container.innerHTML = '<div class="empty-msg">Your cart is empty! <a href="index.html">Go Shopping</a></div>';
        updateTotals(0, 0); 
        return;
    }

    container.innerHTML = '';
    let subTotal = 0;
    let totalShipping = 0; 

    cart.forEach((item, index) => {

        const itemTotal = item.price * item.quantity;
        subTotal += itemTotal;


 
        const itemShipping = (item.shipping || 0) * item.quantity;
        totalShipping += itemShipping;

        const itemHTML = `
            <div class="cart-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="item-details">
                    <h4>${item.name}</h4>
                    <p class="price">Rs. ${item.price}</p>
                    <div class="qty-controls">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>
                <div class="item-actions">
                    <p class="total-price">Rs. ${itemTotal}</p>
                    <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
        container.innerHTML += itemHTML;
    });


    updateTotals(subTotal, totalShipping);
}

  
        function changeQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            
            if (cart[index].quantity + change > 0) {
                cart[index].quantity += change;
                localStorage.setItem('myCart', JSON.stringify(cart));
                loadCart();  
                updateCartCount(); 
            }
        }
        
function checkPriceAndProceed() {
    let cart = JSON.parse(localStorage.getItem('myCart')) || [];
    let total = 0;
    

    cart.forEach(item => {
        total += (item.price * item.quantity) + ((item.shipping || 0) * item.quantity);
    });

    const limit = 20000; 

    if (total > limit) {
    
        document.getElementById('warning-msg').innerText = `Your total is Rs. ${total}.00. Do you want to proceed?`;
        document.getElementById('warning-modal').style.display = 'flex';
    } else {
       
        window.location.href = 'checkout.html';
    }
}


function closeWarning() {
    document.getElementById('warning-modal').style.display = 'none';
}

// Modal Checkout 
function proceedToCheckout() {
    window.location.href = 'checkout.html';
}
       
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.splice(index, 1); 
            localStorage.setItem('myCart', JSON.stringify(cart));
            loadCart();
            updateCartCount();
        }


        function updateTotals(subTotal, totalShipping) {
    // Subtotal 
    document.getElementById('sub-total').innerText = `Rs. ${subTotal}.00`;
    
    // Shipping Fee 
    const shippingEl = document.getElementById('shipping-fee');
    if(shippingEl) {
        shippingEl.innerText = `Rs. ${totalShipping}.00`;
    }

    
    const grandTotal = subTotal + totalShipping;
    document.getElementById('grand-total').innerText = `Rs. ${grandTotal}.00`;
}

        loadCart();
    </script>
</body>
</html>
